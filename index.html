<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecionando...</title>

  <!-- ================================================================= -->
  <!--  >>> CONFIGURAÇÃO <<<  Altere apenas as linhas abaixo             -->
  <!-- ================================================================= -->
  <script>
    const CONFIG = {

      // 1) COLE AQUI O SEU LINK (checkout, página de vendas, afiliado, etc.)
      LINK_DESTINO: "https://tracking.olabet.co.mz/C.ashx?btag=a_60b_7c_&affid=59&siteid=60&adid=7&c=",

      // 2) Tempo de espera antes de redirecionar (em segundos). 0 = imediato.
      ATRASO_SEGUNDOS: 0,

      // 3) Mostrar uma tela de "Carregando..." durante a espera? true / false
      MOSTRAR_CARREGANDO: true
    };
  </script>
  <!-- ================================================================= -->
  <!--  >>> FIM DA CONFIGURAÇÃO <<<  Não precisa mexer abaixo            -->
  <!-- ================================================================= -->

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #carregando {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid #e5e5e5;
      border-top-color: #555;
      border-radius: 50%;
      animation: girar 0.8s linear infinite;
    }
    @keyframes girar { to { transform: rotate(360deg); } }
    .texto { color: #888; font-size: 15px; }
  </style>
</head>
<body>

  <div id="carregando" style="display:none;">
    <div class="spinner"></div>
    <div class="texto">Carregando...</div>
  </div>

  <script>
    (function () {
      // Mostra a tela de carregando se ativada
      if (CONFIG.MOSTRAR_CARREGANDO) {
        document.getElementById("carregando").style.display = "flex";
      }
      // Executa o redirecionamento após o atraso definido
      setTimeout(function () {
        window.location.replace(CONFIG.LINK_DESTINO);
      }, CONFIG.ATRASO_SEGUNDOS * 1000);
    })();
  </script>

  <!-- Fallback: caso o JavaScript esteja desativado, redireciona mesmo assim -->
  <noscript>
    <meta http-equiv="refresh" content="0; urhl=https://tracking.olabet.co.mz/C.ashx?btag=a_60b_7c_&affid=59&siteid=60&adid=7&c=">
  </noscript>

</body>
</html>
