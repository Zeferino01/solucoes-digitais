        .gear {

        .gear-primary {
            animation: rotate-right 2s linear infinite;
            margin-right: -8px;

        }

        .gear-secondary {
            font-size: 32px;
            animation: rotate-left 2s linear infinite;
            margin-top: 12px;
            color: var(--secondary);
            opacity: 0.8;
        }

        @keyframes rotate-right {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotate-left {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        /* Barra de Carregamento */
        .loader-bar {
            width: 100%;
            height: 3px;
            background-color: rgba(255, 255, 255, 0.08);
            margin: 15px 0 20px 0;
            overflow: hidden;
            border-radius: var(--border-soft);
        }

        .loader-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            animation: fillProgress 5s linear forwards;
        }

        @keyframes fillProgress {
            to { width: 100%; }
        }

        .title-status {
            font-size: 1.15rem;
            font-weight: 600;
            color: #f0f0f5;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .description {
            font-size: 0.9rem;
            color: #9090a0;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* Painel de Sucesso */
        .success-panel {
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gift-container {
            position: relative;
            display: inline-block;
            margin: 10px 0;
            width: 100%;
            height: 60px;
        }

        .gift-icon {
            font-size: 2.8rem;
            display: inline-block;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            animation: popOpen 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popOpen {
            0% { transform: translate(-50%, -50%) scale(0); }
            70% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .bonus-amount {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--success);
            margin: 5px 0 15px 0;
            display: block;
            letter-spacing: 1px;

        }

        .timer-info {
            font-size: 0.75rem;
            color: #555565;
            margin-top: 15px;
        }

        /* Partículas da Explosão */
        .confetti-particle {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 6px;
            height: 12px;
            border-radius: 2px;
            opacity: 0;
            z-index: 5;
            pointer-events: none;
            animation: particleExplode 1.8s cubic-bezier(0.1, 0.8, 0.25, 1) forwards;

                left: 50%;

            }
            20% { opacity: 1; }
            100% {
                top: var(--y);
                left: var(--x);
                transform: translate(-50%, -50%) scale(0.5) rotate(var(--r));
                opacity: 0;
            }
        }

        document.getElementById('overlay-trigger').addEventListener('click', () => {
            if (!audioCtx) {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (AudioCtx) {
                    audioCtx = new AudioCtx();
                }
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        });
        
        function gerarValorBonus() {
            const min = 2000;
            const max = 5000;
            const aleatorio = Math.floor(Math.random() * (max - min + 1)) + min;
            const arredondado = Math.round(aleatorio / 5) * 5; 
            document.getElementById('dynamic-bonus').innerText = `Bónus de ${arredondado}MT`;
        }

        function tocarSomExplosao() {
            try {
                if (!audioCtx) {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    if (AudioCtx) audioCtx = new AudioCtx();
                }
                
                const ctx = audioCtx;
                if (!ctx) return;

                // Frequência grave de impacto
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'triangle';
                osc1.frequency.setValueAtTime(180, ctx.currentTime);
                osc1.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.4);
                gain1.gain.setValueAtTime(0.6, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc1.start();
                osc1.stop(ctx.currentTime + 0.4);

                // Notas festivas agudas
                const frequenciasFestivas = [523.25, 659.25, 783.99, 1046.50];
                frequenciasFestivas.forEach((freq, index) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    
                    const atraso = index * 0.05;
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime + atraso);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + atraso + 0.8);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime + atraso);
                    osc.stop(ctx.currentTime + atraso + 0.8);
                });
            } catch (e) {
                console.log("Falha no áudio.");
            }
        }

        function criarExplosaoFocada() {
            const zona = document.getElementById('explosion-zone');
            const cores = ['#ff0055', '#ff5500', '#00ff88', '#00bcff', '#ffcc00', '#ffffff'];
            const totalParticulas = 50;

            for (let i = 0; i < totalParticulas; i++) {
                const particula = document.createElement('div');
                particula.classList.add('confetti-particle');
                
                particula.style.backgroundColor = cores[Math.floor(Math.random() * cores.length)];
                if (Math.random() > 0.5) {
                    particula.style.width = '3px';
                    particula.style.height = Math.random() * 15 + 10 + 'px';
                } else {
                    particula.style.width = Math.random() * 4 + 5 + 'px';
                    particula.style.height = Math.random() * 4 + 5 + 'px';
                }

                const angulo = Math.random() * Math.PI * 2;
                const raio = Math.random() * 130 + 40; 
                
                const destinoX = `calc(50% + ${Math.cos(angulo) * raio}px)`;
                const destinoY = `calc(50% + ${Math.sin(angulo) * (raio * 0.8)}px)`;
                const FinalRot = (Math.random() * 720 - 360) + 'deg';

                particula.style.setProperty('--x', destinoX);
                particula.style.setProperty('--y', destinoY);
                particula.style.setProperty('--r', `${FinalRot}`);
                particula.style.animationDelay = (Math.random() * 0.05) + 's';

                zona.appendChild(particula);
                setTimeout(() => particula.remove(), 1800);
            }
        }

        // Transição e processamento após os 5 segundos
        setTimeout(() => {
            gerarValorBonus();
            
            document.getElementById('panel-processing').style.display = 'none';
            document.getElementById('panel-success').style.display = 'block';
            
            criarExplosaoFocada();
            tocarSomExplosao();

            let tempoRestante = 10;
            const avisoTimer = document.getElementById('countdown-text');
            
            const intervalo = setInterval(() => {
                tempoRestante--;
                if (tempoRestante > 0) {
                    avisoTimer.innerText = `Redirecionando automaticamente em ${tempoRestante} segundos...`;
                } else {
                    clearInterval(intervalo);
                }
            }, 1000);

            // Redirecionamento automático de segurança (mesma janela)
            setTimeout(() => {
                window.location.href = linkAfiliado;
            }, 10000);

        }, 5000);
    </script>
